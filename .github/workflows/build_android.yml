name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Also allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip wget \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            libltdl-dev

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Set up Android SDK with cmdline-tools
        run: |
          SDK_DIR="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"

          # Download latest Android command-line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip \
            -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools_extracted

          # Move to the path sdkmanager expects: cmdline-tools/latest/
          mv /tmp/cmdtools_extracted/cmdline-tools "$SDK_DIR/cmdline-tools/latest"

          # Also create legacy tools/bin/sdkmanager symlink for older buildozer versions
          mkdir -p "$SDK_DIR/tools/bin"
          ln -sf "$SDK_DIR/cmdline-tools/latest/bin/sdkmanager" "$SDK_DIR/tools/bin/sdkmanager"

          SDKMANAGER="$SDK_DIR/cmdline-tools/latest/bin/sdkmanager"

          # Accept all licenses
          yes | "$SDKMANAGER" --sdk_root="$SDK_DIR" --licenses || true

          # Write license files directly as well
          mkdir -p "$SDK_DIR/licenses"
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n' \
            > "$SDK_DIR/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' \
            > "$SDK_DIR/licenses/android-sdk-preview-license"

          # Install build-tools and platform required by buildozer.spec (api=32)
          "$SDKMANAGER" --sdk_root="$SDK_DIR" "build-tools;34.0.0" "platforms;android-32" "platform-tools"

          echo "Android SDK setup complete"
          ls "$SDK_DIR"

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v2
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache Buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v2
          restore-keys: |
            buildozer-local-${{ runner.os }}-

      - name: Build APK with Buildozer
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log
          ls bin/*.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalapagosCarTracking-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "=== Build complete ==="
          ls -lh bin/*.apk 2>/dev/null || echo "No APK found in bin/"
