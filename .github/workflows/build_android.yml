name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Also allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            libltdl-dev

      - name: Install Python build tools
        run: |
          pip install --upgrade pip
          # Cython 3.x dropped 'long' as a builtin — pyjnius requires Cython <3
          pip install buildozer "cython==0.29.37"

      - name: Accept Android SDK licenses
        run: |
          # The runner has Android SDK pre-installed — just accept its licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          # Also write license files directly as a fallback
          mkdir -p "$ANDROID_HOME/licenses"
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee\nd56f5187479451eabf01fb78af6dfcb131a6481e\n' \
            > "$ANDROID_HOME/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd\n' \
            > "$ANDROID_HOME/licenses/android-sdk-preview-license"

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v3
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache Buildozer local directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v3
          restore-keys: |
            buildozer-local-${{ runner.os }}-

      - name: Build APK with Buildozer
        env:
          # Point buildozer at the runner's pre-installed SDK/NDK to skip downloads
          ANDROIDSDK: /usr/local/lib/android/sdk
          ANDROIDNDK: /usr/local/lib/android/sdk/ndk/27.3.13750724
          ANDROIDAPI: "32"
          ANDROIDMINAPI: "21"
        run: |
          yes | buildozer -v android debug 2>&1 | tee build.log
          ls bin/*.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalapagosCarTracking-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Show APK info
        run: |
          echo "=== Build complete ==="
          ls -lh bin/*.apk 2>/dev/null || echo "No APK found in bin/"
